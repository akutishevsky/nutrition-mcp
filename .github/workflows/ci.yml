name: CI

# Runs on every pull request and on every push to main. Merging to main is the
# release — DigitalOcean auto-deploys it — so this is the last gate before a
# change reaches clients at https://nutrition-mcp.com/mcp.
#
# The format check keeps the tree prettier-clean, which is what makes
# `bun run format` safe to run: it only ever touches files you actually edited.

on:
    pull_request:
    push:
        branches: ["main"]

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Check formatting
              run: bun run format:check

            - name: Run tests
              run: bun test
