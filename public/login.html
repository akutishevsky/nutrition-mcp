<!doctype html>
<html>
    <head>
        <title>Nutrition MCP — Sign In</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta charset="utf-8" />
        <link rel="icon" href="/favicon.ico" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <div class="card-wrap login-card">
            <div class="login-header">
                <div class="icon-wrap">🍏</div>
                <h1 class="page-title">Nutrition MCP</h1>
                <p class="page-subtitle">
                    Sign in or create an account to connect
                </p>
            </div>
            {{ERROR}}
            <form method="POST" action="/approve">
                <input type="hidden" name="session_id" value="{{SESSION_ID}}" />
                <div class="field-group">
                    <label class="field-label" for="email">Email</label>
                    <input
                        class="field-input"
                        type="email"
                        id="email"
                        name="email"
                        required
                        autocomplete="email"
                    />
                </div>
                <div class="field-group">
                    <label class="field-label" for="password">Password</label>
                    <input
                        class="field-input"
                        type="password"
                        id="password"
                        name="password"
                        required
                        minlength="6"
                        autocomplete="current-password"
                    />
                </div>
                <div class="btn-row">
                    <button
                        type="submit"
                        name="action"
                        value="login"
                        class="btn btn-primary"
                    >
                        Sign In
                    </button>
                    <button
                        type="submit"
                        name="action"
                        value="register"
                        class="btn btn-secondary"
                    >
                        Register
                    </button>
                </div>
            </form>
        </div>
    </body>
</html>
