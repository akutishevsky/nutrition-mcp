<!doctype html>
<!--
  Meal-logged widget (MCP Apps).

  Rendered inside a sandboxed iframe by MCP Apps hosts (Claude, ChatGPT, VS Code,
  Goose). Fully self-contained — inline CSS + JS, zero network requests — because
  the sandbox blocks external hosts. Styling follows public/widgets/STYLE_GUIDE.md
  (theme tokens, panel surface, donut gauge) so it matches the other widgets.

  Shown after log_meal AND update_meal (both tools link this same widget and emit
  the same structuredContent shape via buildMealProgress in src/mcp.ts): the day's
  running totals vs the user's goals as donut rings. The `action` field ("logged"
  or "updated") only changes the header wording. Per product decision, it renders
  NOTHING when no nutrition goals are set (there is no target to show progress
  against).

  Data arrives as the `structuredContent` of the log_meal / update_meal tool
  result. We read it defensively across host conventions:
    - MCP Apps bridge: postMessage with a tool-result notification
    - ChatGPT Apps SDK: window.openai.toolOutput
    - Standalone preview: window.__NUTRITION_DATA__ (the sample below)

  Theme: follows the OS via prefers-color-scheme by default, and lets a host
  override it (data-theme on <html>, or a `theme` field pushed by the host).
-->
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Meal Logged</title>
        <style>
            :root {
                /* Light theme (default). Dark overridden below.
                   Apple-like neutral grays/whites with the brand green
                   accent, matching the landing page's clean section. */
                --text: #1d1d1f;
                --text-dim: #6e6e73;
                --bg: #f5f5f7;
                --panel: #ffffff;
                --panel-border: #e6e6ea;
                --track: #e6e6ea;
                --accent: #4a7c59;
                --shadow:
                    0 1px 2px rgba(0, 0, 0, 0.05),
                    0 8px 22px rgba(0, 0, 0, 0.05);

                --calories: #ff9f0a;
                --protein: #8b5cf6;
                --carbs: #10b981;
                --fat: #f43f7e;
                --water: #0ea5e9;
                --over: #d0452b;

                --radius: 18px;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --text: #f5f5f7;
                    --text-dim: #98989d;
                    --bg: #000000;
                    --panel: #1c1c1e;
                    --panel-border: #2c2c2e;
                    --track: #2c2c2e;
                    --accent: #6ab98a;
                    --shadow: none;
                    --calories: #ffab2e;
                    --protein: #a78bfa;
                    --carbs: #34d399;
                    --fat: #fb7199;
                    --water: #38bdf8;
                    --over: #ff6b52;
                }
            }

            /* Explicit host override wins over the media query in both directions. */
            :root[data-theme="light"] {
                --text: #1d1d1f;
                --text-dim: #6e6e73;
                --bg: #f5f5f7;
                --panel: #ffffff;
                --panel-border: #e6e6ea;
                --track: #e6e6ea;
                --accent: #4a7c59;
                --shadow:
                    0 1px 2px rgba(0, 0, 0, 0.05),
                    0 8px 22px rgba(0, 0, 0, 0.05);
                --calories: #ff9f0a;
                --protein: #8b5cf6;
                --carbs: #10b981;
                --fat: #f43f7e;
                --water: #0ea5e9;
                --over: #d0452b;
            }
            :root[data-theme="dark"] {
                --text: #f5f5f7;
                --text-dim: #98989d;
                --bg: #000000;
                --panel: #1c1c1e;
                --panel-border: #2c2c2e;
                --track: #2c2c2e;
                --accent: #6ab98a;
                --shadow: none;
                --calories: #ffab2e;
                --protein: #a78bfa;
                --carbs: #34d399;
                --fat: #fb7199;
                --water: #38bdf8;
                --over: #ff6b52;
            }

            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
            }
            body {
                color: var(--text);
                background: var(--bg);
                font-family:
                    ui-sans-serif,
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    Helvetica,
                    Arial,
                    sans-serif;
                font-size: 14px;
                line-height: 1.45;
                -webkit-font-smoothing: antialiased;
            }
            .wrap {
                max-width: 760px;
                margin: 0 auto;
                padding: 18px 16px 22px;
            }
            /* No goals → nothing to show. Collapse padding and drop the
               full-height fill so an empty widget takes up as little of the
               host frame as possible. */
            .wrap:empty {
                padding: 0;
            }
            body:has(.wrap:empty) {
                min-height: 0;
            }

            header.head {
                display: flex;
                align-items: baseline;
                justify-content: space-between;
                gap: 12px;
                flex-wrap: wrap;
                margin-bottom: 14px;
            }
            .head h1 {
                font-size: 21px;
                font-weight: 800;
                margin: 0;
                letter-spacing: -0.03em;
            }
            .head .range {
                color: var(--text-dim);
                font-size: 13px;
                font-weight: 500;
                font-variant-numeric: tabular-nums;
            }

            .section-title {
                font-size: 11.5px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--accent);
                margin: 0 2px 9px;
            }

            /* Stat tiles */
            .tiles {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
                gap: 12px;
            }
            .tile {
                background: var(--panel);
                border: 1px solid var(--panel-border);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                padding: 16px 12px 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            /* Activity-style ring: a conic gradient that fades from the card
               colour (reads as transparent) into full colour at the arc's
               end, over a grey track. --p is the filled fraction (0–1),
               --c the macro colour; both set inline per ring. */
            .ring {
                position: relative;
                width: 92px;
                height: 92px;
            }
            .ring-track,
            .ring-arc {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                -webkit-mask: radial-gradient(
                    farthest-side,
                    transparent calc(100% - 10px),
                    #000 calc(100% - 10px)
                );
                mask: radial-gradient(
                    farthest-side,
                    transparent calc(100% - 10px),
                    #000 calc(100% - 10px)
                );
            }
            .ring-track {
                background: var(--track);
            }
            .ring-arc {
                background: conic-gradient(
                    from 0deg,
                    var(--track) 0deg,
                    var(--c) calc(var(--p) * 360deg),
                    transparent calc(var(--p) * 360deg)
                );
            }
            /* Rounded cap on the leading (coloured) end, Activity-ring style.
               The layer fills the ring and rotates to the arc's end angle;
               its dot sits at 12 o'clock in the middle of the 10px band. */
            .ring-cap {
                position: absolute;
                inset: 0;
                transform: rotate(calc(var(--p) * 360deg));
            }
            .ring-cap::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                width: 10px;
                height: 10px;
                margin-left: -5px;
                border-radius: 50%;
                background: var(--c);
            }
            .ring-center {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                line-height: 1.05;
            }
            .ring-center .rv {
                font-size: 19px;
                font-weight: 800;
                font-variant-numeric: tabular-nums;
                letter-spacing: -0.03em;
            }
            .ring-center .ru {
                font-size: 10px;
                font-weight: 500;
                color: var(--text-dim);
                margin-top: 1px;
            }
            .ring-center .rp {
                font-size: 10.5px;
                font-weight: 700;
                margin-top: 2px;
                font-variant-numeric: tabular-nums;
            }
            .tile .label {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-top: 10px;
                font-size: 11.5px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--text-dim);
            }
            .tile .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex: none;
            }
            .tile .goal {
                margin-top: 3px;
                font-size: 11px;
                color: var(--text-dim);
                font-variant-numeric: tabular-nums;
                min-height: 14px;
            }
        </style>
    </head>
    <body>
        <div class="wrap" id="root"></div>

        <script>
            "use strict";

            // ---- Sample data so the file renders on its own (browser preview) ----
            const SAMPLE = {
                date: "2026-07-11",
                logged_meal: {
                    description: "Grilled chicken salad",
                    meal_type: "lunch",
                    calories: 520,
                    protein_g: 42,
                    carbs_g: 28,
                    fat_g: 22,
                },
                has_goals: true,
                goals: {
                    calories: 2200,
                    protein_g: 160,
                    carbs_g: 220,
                    fat_g: 70,
                    water_ml: 2500,
                },
                totals: {
                    calories: 1480,
                    protein_g: 118,
                    carbs_g: 165,
                    fat_g: 52,
                    water_ml: 1600,
                },
            };

            const MACROS = [
                {
                    key: "calories",
                    label: "Calories",
                    unit: "kcal",
                    color: "var(--calories)",
                    decimals: 0,
                },
                {
                    key: "protein_g",
                    label: "Protein",
                    unit: "g",
                    color: "var(--protein)",
                    decimals: 0,
                },
                {
                    key: "carbs_g",
                    label: "Carbs",
                    unit: "g",
                    color: "var(--carbs)",
                    decimals: 0,
                },
                {
                    key: "fat_g",
                    label: "Fat",
                    unit: "g",
                    color: "var(--fat)",
                    decimals: 0,
                },
                {
                    key: "water_ml",
                    label: "Water",
                    unit: "ml",
                    color: "var(--water)",
                    decimals: 0,
                },
            ];

            function fmt(n, decimals) {
                if (n == null || isNaN(n)) return "0";
                const r = decimals ? n.toFixed(decimals) : Math.round(n);
                return Number(r).toLocaleString();
            }
            function esc(s) {
                return String(s).replace(
                    /[&<>"]/g,
                    (c) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                        })[c],
                );
            }

            // A ring gauge for one macro: a conic gradient fading from
            // transparent into full colour over the filled fraction of the
            // goal, above a grey track. The % caption turns red past 100%; the
            // ring keeps its macro colour so the gauges stay distinguishable.
            function ring(m, totals, goal) {
                const val = totals?.[m.key] ?? 0;
                const target = goal?.[m.key] ?? null;

                let pct = null;
                let over = false;
                if (target != null && target > 0) {
                    pct = (val / target) * 100;
                    over = pct > 100;
                }
                const frac =
                    pct == null ? 0 : Math.max(0, Math.min(pct, 100)) / 100;
                const pctColor = over ? "var(--over)" : m.color;

                let goalLine, center2;
                if (pct == null) {
                    goalLine = "no goal set";
                    center2 = `<div class="ru">${m.unit}</div>`;
                } else {
                    const delta = target - val;
                    const deltaStr =
                        delta >= 0
                            ? `${fmt(delta, m.decimals)} ${m.unit} left`
                            : `${fmt(-delta, m.decimals)} ${m.unit} over`;
                    goalLine = `of ${fmt(target, m.decimals)} ${m.unit} · ${deltaStr}`;
                    center2 = `<div class="rp" style="color:${pctColor}">${Math.round(pct)}%</div>`;
                }

                const cap =
                    pct != null && frac > 0.005
                        ? `<div class="ring-cap"></div>`
                        : "";

                return `
          <div class="tile">
            <div class="ring" style="--c:${m.color};--p:${frac.toFixed(4)}" role="img" aria-label="${esc(m.label)} ${fmt(val, m.decimals)} ${m.unit}">
              <div class="ring-track"></div>
              <div class="ring-arc"></div>
              ${cap}
              <div class="ring-center">
                <div class="rv">${fmt(val, m.decimals)}</div>
                ${center2}
              </div>
            </div>
            <div class="label"><span class="dot" style="background:${m.color}"></span>${m.label}</div>
            <div class="goal">${esc(goalLine)}</div>
          </div>`;
            }

            function render(data) {
                const root = document.getElementById("root");

                // Per product decision: with no goals there is no target to show
                // progress against, so the widget shows nothing at all.
                if (!data || !data.has_goals || !data.goals) {
                    root.innerHTML = "";
                    return;
                }

                const totals = data.totals || {};
                const rings = MACROS.map((m) =>
                    ring(m, totals, data.goals),
                ).join("");

                const meal = data.logged_meal;
                let sub = "";
                if (meal && meal.description) {
                    const bits = [esc(meal.description)];
                    if (meal.meal_type) bits.push(esc(meal.meal_type));
                    if (meal.calories != null)
                        bits.push(`${fmt(meal.calories, 0)} kcal`);
                    sub = bits.join(" · ");
                }

                // Same widget for log_meal and update_meal — the action only
                // changes the header wording.
                const title =
                    data.action === "updated" ? "Meal updated" : "Meal logged";

                root.innerHTML = `
          <header class="head">
            <h1>${title}</h1>
            ${sub ? `<span class="range">${sub}</span>` : ""}
          </header>
          <div class="section-title">Today vs goal</div>
          <div class="tiles">${rings}</div>`;
            }

            // ---- Theme handling ------------------------------------------------
            function applyTheme(theme) {
                if (theme === "light" || theme === "dark") {
                    document.documentElement.setAttribute("data-theme", theme);
                }
            }
            function themeFrom(obj) {
                if (!obj || typeof obj !== "object") return null;
                return (
                    obj.theme ||
                    obj.colorScheme ||
                    obj.hostContext?.theme ||
                    obj.styles?.theme ||
                    obj.globals?.theme ||
                    null
                );
            }

            // ---- Rendering intake ----------------------------------------------
            function coerce(payload) {
                if (!payload || typeof payload !== "object") return null;
                // The structuredContent object itself, or a wrapper around it.
                if (
                    payload.totals ||
                    payload.logged_meal ||
                    "has_goals" in payload
                )
                    return payload;
                if (payload.structuredContent) return payload.structuredContent;
                return null;
            }
            function show(payload) {
                const data = coerce(payload);
                if (!data) return false;
                render(data);
                return true;
            }

            // ---- MCP Apps host bridge (JSON-RPC over postMessage) --------------
            // Critical: the host does NOT push tool data until the app announces
            // itself with a `ui/initialize` request and the handshake completes.
            // Without this, only the fallback sample below ever renders. The host
            // then sends `ui/notifications/tool-result` carrying structuredContent.
            // Spec: MCP Apps 2026-01-26.
            const host =
                window.parent && window.parent !== window
                    ? window.parent
                    : null;
            let initId = 0;
            function post(msg) {
                try {
                    if (host) host.postMessage(msg, "*");
                } catch (_) {}
            }

            // Report our content height so the host sizes the iframe to fit
            // (MCP Apps ui/notifications/size-changed). Without this the host
            // uses a default height and clips the widget. Measure the
            // document's natural (max-content) height, then restore.
            function sendSize() {
                if (!host) return;
                const el = document.documentElement;
                const prev = el.style.height;
                el.style.height = "max-content";
                const height = Math.ceil(el.getBoundingClientRect().height);
                el.style.height = prev;
                post({
                    jsonrpc: "2.0",
                    method: "ui/notifications/size-changed",
                    params: { width: Math.ceil(window.innerWidth), height },
                });
            }
            if (host && typeof ResizeObserver !== "undefined") {
                let scheduled = false;
                const ro = new ResizeObserver(() => {
                    if (scheduled) return;
                    scheduled = true;
                    requestAnimationFrame(() => {
                        scheduled = false;
                        sendSize();
                    });
                });
                ro.observe(document.documentElement);
                ro.observe(document.body);
            }

            window.addEventListener("message", (event) => {
                const d = event.data;
                if (!d || typeof d !== "object") return;

                // JSON-RPC response to our ui/initialize: carries host context
                // (theme, container info, capabilities). Per the MCP Apps
                // handshake we MUST answer with ui/notifications/initialized —
                // strict hosts (e.g. MCP Inspector) withhold the tool result
                // until they receive it.
                if (d.id != null && d.id === initId && d.result) {
                    const t =
                        themeFrom(d.result) || themeFrom(d.result.hostContext);
                    if (t) applyTheme(t);
                    post({
                        jsonrpc: "2.0",
                        method: "ui/notifications/initialized",
                    });
                    return;
                }

                // Host notifications (tool-input, tool-result, ...).
                if (typeof d.method === "string") {
                    const p = d.params || {};
                    const t = themeFrom(d) || themeFrom(p);
                    if (t) applyTheme(t);
                    if (d.method.endsWith("tool-result")) {
                        show(p.structuredContent || p);
                    }
                    return;
                }

                // Lenient fallback: a host/tool that posts the payload bare.
                const t = themeFrom(d);
                if (t) applyTheme(t);
                show(d.structuredContent || d);
            });

            if (host) {
                // No loading state: the widget may legitimately end up empty
                // (no goals), so we start blank and only fill in on data.

                // Announce the app so the host starts delivering tool data.
                // Field names MUST match the McpUiInitializeRequest schema
                // exactly (appInfo / appCapabilities — NOT the MCP-core
                // clientInfo / capabilities); strict hosts validate this request
                // and silently drop it if the shape is wrong.
                initId = 1;
                post({
                    jsonrpc: "2.0",
                    id: initId,
                    method: "ui/initialize",
                    params: {
                        protocolVersion: "2026-01-26",
                        appInfo: {
                            name: "meal-logged-widget",
                            version: "1.0.0",
                        },
                        appCapabilities: {},
                    },
                });

                // ChatGPT Apps SDK compatibility: data/theme may be exposed on a
                // global and refreshed via a custom event instead of postMessage.
                try {
                    if (window.openai) {
                        if (window.openai.theme)
                            applyTheme(window.openai.theme);
                        if (window.openai.toolOutput)
                            show(window.openai.toolOutput);
                    }
                    window.addEventListener("openai:set_globals", (e) => {
                        const g = e.detail?.globals || e.detail || {};
                        const t = themeFrom(g);
                        if (t) applyTheme(t);
                        if (g.toolOutput) show(g.toolOutput);
                    });
                } catch (_) {}
            } else {
                // Opened directly in a browser (no host) — render the sample so
                // the file is previewable on its own.
                render(window.__NUTRITION_DATA__ || SAMPLE);
            }
        </script>
    </body>
</html>
