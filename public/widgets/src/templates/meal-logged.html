<!doctype html>
<!--
  Meal-logged widget (MCP Apps).

  Assembled from shared partials at server startup (see src/widgets.ts); the
  @include markers below inline the shared design tokens, components, and host
  bridge. The result is fully self-contained — inline CSS + JS, zero network
  requests — because the MCP Apps sandbox blocks external hosts. Styling follows
  public/widgets/STYLE_GUIDE.md so it matches the other widgets.

  Shown after log_meal AND update_meal (both tools link this same widget and emit
  the same structuredContent shape via buildMealProgress in src/mcp.ts): the day's
  running totals vs the user's goals as donut rings. The `action` field ("logged"
  or "updated") only changes the header wording. Per product decision, it renders
  NOTHING when no nutrition goals are set (there is no target to show progress
  against).

  Data arrives as the `structuredContent` of the log_meal / update_meal tool
  result; the shared bridge (shared/bridge.js) reads it across host conventions
  and calls render(). Standalone preview uses the SAMPLE below.
-->
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Meal Logged</title>
        <style>
            /*@include shared/tokens.css@*/

            /*@include shared/base.css@*/

            /* No goals → nothing to show. Collapse padding and drop the
               full-height fill so an empty widget takes up as little of the
               host frame as possible. */
            .wrap:empty {
                padding: 0;
            }
            body:has(.wrap:empty) {
                min-height: 0;
            }

            /* Stat tiles */
            .tiles {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
                gap: 12px;
            }
            .tile {
                background: var(--panel);
                border: 1px solid var(--panel-border);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                padding: 16px 12px 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            /*@include shared/ring.css@*/

            .tile .label {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-top: 10px;
                font-size: 11.5px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--text-dim);
            }
            .tile .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex: none;
            }
            .tile .goal {
                margin-top: 3px;
                font-size: 11px;
                color: var(--text-dim);
                font-variant-numeric: tabular-nums;
                min-height: 14px;
            }
        </style>
    </head>
    <body>
        <div class="wrap" id="root"></div>

        <script>
            "use strict";

            /*@include shared/bridge.js@*/

            // ---- Sample data so the file renders on its own (browser preview) ----
            const SAMPLE = {
                date: "2026-07-11",
                logged_meal: {
                    description: "Grilled chicken salad",
                    meal_type: "lunch",
                    calories: 520,
                    protein_g: 42,
                    carbs_g: 28,
                    fat_g: 22,
                },
                has_goals: true,
                goals: {
                    calories: 2200,
                    protein_g: 160,
                    carbs_g: 220,
                    fat_g: 70,
                    water_ml: 2500,
                },
                totals: {
                    calories: 1480,
                    protein_g: 118,
                    carbs_g: 165,
                    fat_g: 52,
                    water_ml: 1600,
                },
            };

            const MACROS = [
                {
                    key: "calories",
                    label: "Calories",
                    unit: "kcal",
                    color: "var(--calories)",
                    decimals: 0,
                },
                {
                    key: "protein_g",
                    label: "Protein",
                    unit: "g",
                    color: "var(--protein)",
                    decimals: 0,
                },
                {
                    key: "carbs_g",
                    label: "Carbs",
                    unit: "g",
                    color: "var(--carbs)",
                    decimals: 0,
                },
                {
                    key: "fat_g",
                    label: "Fat",
                    unit: "g",
                    color: "var(--fat)",
                    decimals: 0,
                },
                {
                    key: "water_ml",
                    label: "Water",
                    unit: "ml",
                    color: "var(--water)",
                    decimals: 0,
                },
            ];

            function fmt(n, decimals) {
                if (n == null || isNaN(n)) return "0";
                const r = decimals ? n.toFixed(decimals) : Math.round(n);
                return Number(r).toLocaleString();
            }
            function esc(s) {
                return String(s).replace(
                    /[&<>"]/g,
                    (c) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                        })[c],
                );
            }

            // A ring gauge for one macro: a conic gradient fading from
            // transparent into full colour over the filled fraction of the
            // goal, above a grey track. The % caption turns red past 100%; the
            // ring keeps its macro colour so the gauges stay distinguishable.
            function ring(m, totals, goal) {
                const val = totals?.[m.key] ?? 0;
                const target = goal?.[m.key] ?? null;

                let pct = null;
                let over = false;
                if (target != null && target > 0) {
                    pct = (val / target) * 100;
                    over = pct > 100;
                }
                const frac =
                    pct == null ? 0 : Math.max(0, Math.min(pct, 100)) / 100;
                const pctColor = over ? "var(--over)" : m.color;

                let goalLine, center2;
                if (pct == null) {
                    goalLine = "no goal set";
                    center2 = `<div class="ru">${m.unit}</div>`;
                } else {
                    const delta = target - val;
                    const deltaStr =
                        delta >= 0
                            ? `${fmt(delta, m.decimals)} ${m.unit} left`
                            : `${fmt(-delta, m.decimals)} ${m.unit} over`;
                    goalLine = `of ${fmt(target, m.decimals)} ${m.unit} · ${deltaStr}`;
                    center2 = `<div class="rp" style="color:${pctColor}">${Math.round(pct)}%</div>`;
                }

                const cap =
                    pct != null && frac > 0.005
                        ? `<div class="ring-cap"></div>`
                        : "";

                return `
          <div class="tile">
            <div class="ring" style="--c:${m.color};--p:${frac.toFixed(4)}" role="img" aria-label="${esc(m.label)} ${fmt(val, m.decimals)} ${m.unit}">
              <div class="ring-track"></div>
              <div class="ring-arc"></div>
              ${cap}
              <div class="ring-center">
                <div class="rv">${fmt(val, m.decimals)}</div>
                ${center2}
              </div>
            </div>
            <div class="label"><span class="dot" style="background:${m.color}"></span>${m.label}</div>
            <div class="goal">${esc(goalLine)}</div>
          </div>`;
            }

            function render(data) {
                const root = document.getElementById("root");

                // Per product decision: with no goals there is no target to show
                // progress against, so the widget shows nothing at all.
                if (!data || !data.has_goals || !data.goals) {
                    root.innerHTML = "";
                    return;
                }

                const totals = data.totals || {};
                const rings = MACROS.map((m) =>
                    ring(m, totals, data.goals),
                ).join("");

                const meal = data.logged_meal;
                let sub = "";
                if (meal && meal.description) {
                    const bits = [esc(meal.description)];
                    if (meal.meal_type) bits.push(esc(meal.meal_type));
                    if (meal.calories != null)
                        bits.push(`${fmt(meal.calories, 0)} kcal`);
                    sub = bits.join(" · ");
                }

                // Same widget for log_meal and update_meal — the action only
                // changes the header wording.
                const title =
                    data.action === "updated" ? "Meal updated" : "Meal logged";

                root.innerHTML = `
          <header class="head">
            <h1>${title}</h1>
            ${sub ? `<span class="range">${sub}</span>` : ""}
          </header>
          <div class="section-title">Today vs goal</div>
          <div class="tiles">${rings}</div>`;
            }

            // Pull the meal progress out of whatever wrapper the host used.
            function coerce(payload) {
                if (!payload || typeof payload !== "object") return null;
                // The structuredContent object itself, or a wrapper around it.
                if (
                    payload.totals ||
                    payload.logged_meal ||
                    "has_goals" in payload
                )
                    return payload;
                if (payload.structuredContent) return payload.structuredContent;
                return null;
            }

            initWidget({
                name: "meal-logged-widget",
                // No loading state: the widget may legitimately end up empty
                // (no goals), so we start blank and only fill in on data.
                loading: "",
                coerce,
                render,
                sample: SAMPLE,
            });
        </script>
    </body>
</html>
