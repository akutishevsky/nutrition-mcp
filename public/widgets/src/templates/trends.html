<!doctype html>
<!--
  Trends widget (MCP Apps).

  Assembled from shared partials at server startup (see src/widgets.ts); the
  @include markers below inline the shared design tokens, components, and host
  bridge. The result is fully self-contained — inline CSS + JS, zero network
  requests — because the MCP Apps sandbox blocks external hosts.

  Shown after get_trends. The tool sends up to 30 days of daily series, and the
  7 / 14 / 30-day toggle slices it CLIENT-SIDE and re-renders — no host round-trip,
  so switching ranges is instant. Each range shows a calories/day line chart and
  the trailing average vs goal as rings (average over the window, empty days
  counted as 0, matching the tool's text output).

  Data arrives as the `structuredContent` of the get_trends tool result; the
  shared bridge (shared/bridge.js) reads it across host conventions and calls
  render(). Standalone preview uses the SAMPLE below.
-->
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Trends</title>
        <style>
            /*@include shared/tokens.css@*/

            /*@include shared/base.css@*/

            /* Segmented control (7 / 14 / 30-day toggle). The active label uses
               var(--bg) on the accent fill so it stays high-contrast in both
               themes (off-white on dark-green in light, black on light-green in
               dark). */
            /*@include shared/seg.css@*/

            /* Calories trend chart (hand-built SVG area + line) */
            /*@include shared/trend.css@*/

            /* Stat tiles */
            .tiles {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
                gap: 12px;
            }
            .tile {
                background: var(--panel);
                border: 1px solid var(--panel-border);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                padding: 16px 12px 15px;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            /* Activity-style ring: a conic gradient that fades from the card
               colour (reads as transparent) into full colour at the arc's
               end, over a grey track. --p is the filled fraction (0–1),
               --c the macro colour; both set inline per ring. */
            .ring {
                position: relative;
                width: 92px;
                height: 92px;
            }
            .ring-track,
            .ring-arc {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                -webkit-mask: radial-gradient(
                    farthest-side,
                    transparent calc(100% - 10px),
                    #000 calc(100% - 10px)
                );
                mask: radial-gradient(
                    farthest-side,
                    transparent calc(100% - 10px),
                    #000 calc(100% - 10px)
                );
            }
            .ring-track {
                background: var(--track);
            }
            .ring-arc {
                background: conic-gradient(
                    from 0deg,
                    var(--track) 0deg,
                    var(--c) calc(var(--p) * 360deg),
                    transparent calc(var(--p) * 360deg)
                );
            }
            .ring-cap {
                position: absolute;
                inset: 0;
                transform: rotate(calc(var(--p) * 360deg));
            }
            .ring-cap::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                width: 10px;
                height: 10px;
                margin-left: -5px;
                border-radius: 50%;
                background: var(--c);
            }
            .ring-center {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                line-height: 1.05;
            }
            .ring-center .rv {
                font-size: 19px;
                font-weight: 800;
                font-variant-numeric: tabular-nums;
                letter-spacing: -0.03em;
            }
            .ring-center .ru {
                font-size: 10px;
                font-weight: 500;
                color: var(--text-dim);
                margin-top: 1px;
            }
            .ring-center .rp {
                font-size: 10.5px;
                font-weight: 700;
                margin-top: 2px;
                font-variant-numeric: tabular-nums;
            }
            .tile .label {
                display: flex;
                align-items: center;
                gap: 6px;
                margin-top: 10px;
                font-size: 11.5px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: var(--text-dim);
            }
            .tile .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex: none;
            }
            .tile .goal {
                margin-top: 3px;
                font-size: 11px;
                color: var(--text-dim);
                font-variant-numeric: tabular-nums;
                min-height: 14px;
            }
        </style>
    </head>
    <body>
        <div class="wrap" id="root"></div>

        <script>
            "use strict";

            /*@include shared/bridge.js@*/

            const RANGES = [7, 14, 30];

            // ---- Sample data so the file renders on its own (browser preview) ----
            function buildSample() {
                const days = [];
                const end = new Date("2026-07-11T00:00:00Z");
                let date = "2026-07-11";
                for (let i = 29; i >= 0; i--) {
                    const d = new Date(end);
                    d.setUTCDate(d.getUTCDate() - i);
                    date = d.toISOString().slice(0, 10);
                    const w = Math.sin(i / 3);
                    const skip = i === 4 || i === 11; // a couple of unlogged days
                    days.push({
                        date,
                        calories: skip ? 0 : Math.round(2010 + w * 250),
                        protein_g: skip ? 0 : Math.round(150 + w * 18),
                        carbs_g: skip ? 0 : Math.round(212 + w * 28),
                        fat_g: skip ? 0 : Math.round(68 + w * 9),
                        water_ml: skip ? 0 : Math.round(2200 + w * 320),
                    });
                }
                return {
                    end_date: date,
                    default_range: 14,
                    goals: {
                        calories: 2200,
                        protein_g: 160,
                        carbs_g: 220,
                        fat_g: 70,
                        water_ml: 2500,
                    },
                    days,
                };
            }
            const SAMPLE = buildSample();

            const MACROS = [
                {
                    key: "calories",
                    label: "Calories",
                    unit: "kcal",
                    color: "var(--calories)",
                    decimals: 0,
                },
                {
                    key: "protein_g",
                    label: "Protein",
                    unit: "g",
                    color: "var(--protein)",
                    decimals: 0,
                },
                {
                    key: "carbs_g",
                    label: "Carbs",
                    unit: "g",
                    color: "var(--carbs)",
                    decimals: 0,
                },
                {
                    key: "fat_g",
                    label: "Fat",
                    unit: "g",
                    color: "var(--fat)",
                    decimals: 0,
                },
                {
                    key: "water_ml",
                    label: "Water",
                    unit: "ml",
                    color: "var(--water)",
                    decimals: 0,
                },
            ];

            function fmt(n, decimals) {
                if (n == null || isNaN(n)) return "0";
                const r = decimals ? n.toFixed(decimals) : Math.round(n);
                return Number(r).toLocaleString();
            }
            function esc(s) {
                return String(s).replace(
                    /[&<>"]/g,
                    (c) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                        })[c],
                );
            }
            // Trailing average over exactly the days shown: sum / count, empty
            // days included as 0 — matches the tool's text trailingAverage.
            function avgOf(days, key) {
                if (!days.length) return 0;
                let sum = 0;
                for (const d of days) sum += d[key] || 0;
                return sum / days.length;
            }

            // A ring gauge for one macro (see STYLE_GUIDE.md): the % caption
            // turns red past 100%; the ring keeps its macro colour. Without a
            // goal it just shows the average value.
            function ring(m, avg, goal) {
                const val = avg?.[m.key] ?? 0;
                const target = goal?.[m.key] ?? null;

                let pct = null;
                let over = false;
                if (target != null && target > 0) {
                    pct = (val / target) * 100;
                    over = pct > 100;
                }
                const frac =
                    pct == null ? 0 : Math.max(0, Math.min(pct, 100)) / 100;
                const pctColor = over ? "var(--over)" : m.color;

                let goalLine, center2;
                if (pct == null) {
                    goalLine = "no goal set";
                    center2 = `<div class="ru">${m.unit}</div>`;
                } else {
                    const delta = target - val;
                    const deltaStr =
                        delta >= 0
                            ? `${fmt(delta, m.decimals)} ${m.unit} under`
                            : `${fmt(-delta, m.decimals)} ${m.unit} over`;
                    goalLine = `of ${fmt(target, m.decimals)} ${m.unit} · ${deltaStr}`;
                    center2 = `<div class="rp" style="color:${pctColor}">${Math.round(pct)}%</div>`;
                }

                const cap =
                    pct != null && frac > 0.005
                        ? `<div class="ring-cap"></div>`
                        : "";

                return `
          <div class="tile">
            <div class="ring" style="--c:${m.color};--p:${frac.toFixed(4)}" role="img" aria-label="${esc(m.label)} average ${fmt(val, m.decimals)} ${m.unit}">
              <div class="ring-track"></div>
              <div class="ring-arc"></div>
              ${cap}
              <div class="ring-center">
                <div class="rv">${fmt(val, m.decimals)}</div>
                ${center2}
              </div>
            </div>
            <div class="label"><span class="dot" style="background:${m.color}"></span>${m.label}</div>
            <div class="goal">${esc(goalLine)}</div>
          </div>`;
            }

            // Calories-per-day trend: SVG area + line that scales to any range
            // (7 to 30 days). Uniform scaling — no preserveAspectRatio
            // distortion — so it keeps its aspect ratio at any container width.
            function trendChart(days, goal) {
                const W = 480,
                    H = 88,
                    padL = 8,
                    padR = 8,
                    padT = 10,
                    padB = 6;
                const n = days.length;
                const vals = days.map((d) => d.calories || 0);
                const maxV = Math.max(...vals, goal || 0, 1) * 1.15;
                const plotW = W - padL - padR;
                const plotH = H - padT - padB;
                const base = padT + plotH;
                const x = (i) =>
                    n === 1 ? padL + plotW / 2 : padL + (plotW * i) / (n - 1);
                const y = (v) => padT + plotH - (v / maxV) * plotH;
                const pts = vals.map((v, i) => [x(i), y(v)]);

                const line = pts
                    .map(
                        (p, i) =>
                            `${i ? "L" : "M"}${p[0].toFixed(1)} ${p[1].toFixed(1)}`,
                    )
                    .join(" ");
                const area =
                    `M${pts[0][0].toFixed(1)} ${base} ` +
                    pts
                        .map((p) => `L${p[0].toFixed(1)} ${p[1].toFixed(1)}`)
                        .join(" ") +
                    ` L${pts[n - 1][0].toFixed(1)} ${base} Z`;

                const goalLine =
                    goal && goal > 0
                        ? `<line class="goalline" x1="${padL}" y1="${y(goal).toFixed(1)}" x2="${W - padR}" y2="${y(goal).toFixed(1)}"/>`
                        : "";
                // Only draw point markers on short ranges to avoid clutter.
                const dots =
                    n <= 14
                        ? pts
                              .map(
                                  (p) =>
                                      `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.4" fill="var(--calories)"/>`,
                              )
                              .join("")
                        : "";
                const md = (d) => esc(d.date.slice(5)); // MM-DD
                const avg = Math.round(avgOf(days, "calories"));

                return `
          <div class="trend">
            <div class="thead">
              <span class="ttitle">Calories / day</span>
              <span class="tmeta">avg ${fmt(avg, 0)}${goal && goal > 0 ? ` · goal ${fmt(goal, 0)}` : ""}</span>
            </div>
            <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Calories per day over the selected range">
              <defs>
                <linearGradient id="calfill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="var(--calories)" stop-opacity="0.28"/>
                  <stop offset="100%" stop-color="var(--calories)" stop-opacity="0.02"/>
                </linearGradient>
              </defs>
              <line class="axis" x1="${padL}" y1="${base}" x2="${W - padR}" y2="${base}"/>
              ${goalLine}
              <path d="${area}" fill="url(#calfill)"/>
              <path d="${line}" fill="none" stroke="var(--calories)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
              ${dots}
            </svg>
            <div class="tdates">
              <span>${md(days[0])}</span>
              <span>${md(days[n - 1])}</span>
            </div>
          </div>`;
            }

            // ---- State + rendering ---------------------------------------------
            const STATE = { data: null, range: 30 };

            function render(data) {
                STATE.data = data;
                const root = document.getElementById("root");
                // The tool sends a bucket for every calendar day (zeros for
                // unlogged days), so the array is basically never empty — treat
                // an all-zero series (nothing logged) as empty too.
                const anyLogged =
                    data &&
                    Array.isArray(data.days) &&
                    data.days.some(
                        (d) =>
                            (d.calories || 0) > 0 ||
                            (d.protein_g || 0) > 0 ||
                            (d.carbs_g || 0) > 0 ||
                            (d.fat_g || 0) > 0 ||
                            (d.water_ml || 0) > 0,
                    );
                if (!anyLogged) {
                    root.innerHTML = `
            <div class="empty">
              <div class="big">📈</div>
              <div>No meals or water logged in this range yet.</div>
            </div>`;
                    return;
                }
                STATE.range = RANGES.includes(data.default_range)
                    ? data.default_range
                    : 30;
                paint();
            }

            function paint() {
                const root = document.getElementById("root");
                const data = STATE.data;
                const all = data.days
                    .slice()
                    .sort((a, b) => (a.date < b.date ? -1 : 1));
                const range = STATE.range;
                const slice = all.slice(-range);
                const n = slice.length;

                const avg = {};
                for (const m of MACROS) avg[m.key] = avgOf(slice, m.key);

                const logged = slice.filter(
                    (d) =>
                        (d.calories || 0) > 0 ||
                        (d.protein_g || 0) > 0 ||
                        (d.carbs_g || 0) > 0 ||
                        (d.fat_g || 0) > 0 ||
                        (d.water_ml || 0) > 0,
                ).length;

                const seg = RANGES.map(
                    (r) =>
                        `<button class="seg-btn${r === range ? " active" : ""}" data-n="${r}" role="tab" aria-selected="${r === range}">${r} days</button>`,
                ).join("");

                const rings = MACROS.map((m) => ring(m, avg, data.goals)).join(
                    "",
                );
                const chart = trendChart(slice, data.goals?.calories ?? null);

                root.innerHTML = `
          <header class="head">
            <h1>Trends</h1>
            <span class="range">${esc(slice[0].date)} → ${esc(slice[n - 1].date)} · ${logged}/${n} days logged</span>
          </header>
          <div class="seg" role="tablist" aria-label="Trend window">${seg}</div>
          ${chart}
          <div class="section-title">${range}-day average vs goal</div>
          <div class="tiles">${rings}</div>`;
            }

            // Delegated on #root, which persists across paint()'s innerHTML
            // rewrites, so it's attached once.
            document.getElementById("root").addEventListener("click", (e) => {
                const btn = e.target.closest(".seg-btn");
                if (!btn) return;
                const n = Number(btn.dataset.n);
                if (n && n !== STATE.range && STATE.data) {
                    STATE.range = n;
                    paint();
                }
            });

            // ---- Rendering intake ----------------------------------------------
            function coerce(payload) {
                if (!payload || typeof payload !== "object") return null;
                if (Array.isArray(payload.days)) return payload;
                if (payload.structuredContent) return payload.structuredContent;
                return null;
            }

            initWidget({
                name: "trends-widget",
                loading:
                    '<div class="empty"><div class="big">📈</div><div>Loading your trends…</div></div>',
                coerce,
                render,
                sample: SAMPLE,
            });
        </script>
    </body>
</html>
